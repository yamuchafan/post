name: Daily Yoruplus Draft

on:
  schedule:
    - cron: "5 0 * * *"   # JST 09:05
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run daily job
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_CATEGORY_ID: ${{ secrets.WP_CATEGORY_ID }}
        run: python scripts/daily_job.py

      - name: Commit state and drafts
        run: |
          git config user.name "yoruplus-bot"
          git config user.email "bot@example.com"
          git add state/processed.json drafts/
          git diff --cached --quiet || git commit -m "daily draft update"
          git push
